name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Auto-revert failed push
        if: ${{ failure() && github.event_name == 'push' && github.actor != 'github-actions[bot]' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_SHA="${{ github.sha }}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          PARENTS=$(git rev-list --parents -n 1 "$TARGET_SHA" | awk '{print NF-1}')

          # Skip root commit to avoid deleting repository contents.
          if [ "$PARENTS" -eq 0 ]; then
            echo "Skipping auto-revert: root commit cannot be safely reverted."
            exit 0
          fi

          # Keep behavior predictable: only auto-revert non-merge commits.
          if [ "$PARENTS" -gt 1 ]; then
            echo "Skipping auto-revert: merge commit detected ($TARGET_SHA)."
            exit 0
          fi

          git revert --no-edit "$TARGET_SHA"
          git push origin "HEAD:$BRANCH"
