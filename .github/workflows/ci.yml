name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Auto-revert failed push
        if: ${{ failure() && github.event_name == 'push' && github.actor != 'github-actions[bot]' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF#refs/heads/}"
          BEFORE_SHA="${{ github.event.before }}"
          TARGET_SHA="${{ github.sha }}"
          API_URL="${{ github.api_url }}"
          REPO="${{ github.repository }}"

          RUNS_JSON=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL/repos/$REPO/actions/workflows/ci.yml/runs?branch=$BRANCH&status=success&per_page=20")

          LAST_GREEN_SHA=$(echo "$RUNS_JSON" | jq -r '.workflow_runs[]? | select(.event == "push") | .head_sha' | head -n 1)

          if [ -n "$LAST_GREEN_SHA" ] && [ "$LAST_GREEN_SHA" != "null" ] && [ "$LAST_GREEN_SHA" != "$TARGET_SHA" ]; then
            echo "Last green SHA: $LAST_GREEN_SHA"
            COMMITS=$(git rev-list "$LAST_GREEN_SHA..$TARGET_SHA")
          elif [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No valid last green SHA. Falling back to current target commit."
            COMMITS="$TARGET_SHA"
          else
            echo "No valid last green SHA. Falling back to push range."
            COMMITS=$(git rev-list "$BEFORE_SHA..$TARGET_SHA")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits found to rollback."
            exit 0
          fi

          for COMMIT_SHA in $COMMITS; do
            PARENTS=$(git rev-list --parents -n 1 "$COMMIT_SHA" | awk '{print NF-1}')

            # Skip root commit to avoid deleting repository contents.
            if [ "$PARENTS" -eq 0 ]; then
              echo "Skipping root commit: $COMMIT_SHA"
              continue
            fi

            if [ "$PARENTS" -gt 1 ]; then
              echo "Reverting merge commit: $COMMIT_SHA"
              if ! git revert --no-edit -m 1 "$COMMIT_SHA"; then
                if git diff --quiet && git diff --cached --quiet; then
                  echo "Skipping already-neutralized merge commit: $COMMIT_SHA"
                  continue
                fi
                echo "Revert failed with conflicts on merge commit: $COMMIT_SHA"
                exit 1
              fi
            else
              echo "Reverting commit: $COMMIT_SHA"
              if ! git revert --no-edit "$COMMIT_SHA"; then
                if git diff --quiet && git diff --cached --quiet; then
                  echo "Skipping already-neutralized commit: $COMMIT_SHA"
                  continue
                fi
                echo "Revert failed with conflicts on commit: $COMMIT_SHA"
                exit 1
              fi
            fi
          done

          git push origin "HEAD:$BRANCH"
